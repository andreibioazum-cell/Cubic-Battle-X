name: Build C APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build C Code
        run: |
          # Компиляция под 64-бит
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang \
          -shared -fPIC main.c -o libmain.so \
          -I$ANDROID_NDK_ROOT/sources/android/native_app_glue \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c \
          -landroid -llog -lEGL -lGLESv2

      - name: Auto-generate AndroidManifest
        run: |
          cat <<EOF > AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.battle">
              <application android:label="Cubic Battle C" android:hasCode="false">
                  <activity android:name="android.app.NativeActivity" 
                            android:configChanges="orientation|screenSize|keyboardHidden"
                            android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="main" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Package and Sign APK
        run: |
          # Находим инструменты
          SDK_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$SDK_VERSION
          PLATFORM_JAR=$(ls $ANDROID_HOME/platforms/*/android.jar | tail -n 1)
          
          mkdir -p staging/lib/arm64-v8a
          cp libmain.so staging/lib/arm64-v8a/

          # 1. Упаковка
          $BUILD_TOOLS/aapt package -f -M AndroidManifest.xml \
          -I $PLATFORM_JAR \
          -F unsigned.apk staging/

          # 2. Выравнивание
          $BUILD_TOOLS/zipalign -v 4 unsigned.apk aligned.apk

          # 3. Подпись
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          $BUILD_TOOLS/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --out final.apk aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-C-APK
          path: final.apk
