name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install Android Platform
        run: |
          # Устанавливаем платформу 30 и build-tools
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-30" "build-tools;30.0.3"

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Build APK
        # Добавляем переменные окружения, чтобы cargo-apk точно видел NDK
        run: cargo apk build
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-APK
          path: target/debug/apk/cubicbattle.apk
