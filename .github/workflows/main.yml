name: Build Raylib APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install Raylib and Build
        run: |
          # 1. Скачиваем Raylib
          git clone --depth 1 https://github.com/raysan5/raylib.git
          
          # 2. Компилируем Raylib под Android (arm64-v8a)
          cd raylib/src
          make PLATFORM=PLATFORM_ANDROID \
               ANDROID_NDK=$ANDROID_NDK_ROOT \
               ANDROID_ARCH=arm64-v8a \
               ANDROID_API_VERSION=30 -j$(nproc)
          cd ../..

          # 3. Компилируем твою игру
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang \
          -shared -fPIC main.c -o libmain.so \
          -Iraylib/src -Lraylib/src -lraylib -landroid -llog -lEGL -lGLESv2 -lm

      - name: Package APK
        run: |
          # Генерируем манифест
          cat <<EOF > AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.raylib">
              <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
              <application android:label="Raylib 3D" android:hasCode="false">
                  <activity android:name="android.app.NativeActivity" android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="main" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          SDK_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$SDK_VERSION
          PLATFORM_JAR=$(ls $ANDROID_HOME/platforms/*/android.jar | tail -n 1)
          
          mkdir -p staging/lib/arm64-v8a
          cp libmain.so staging/lib/arm64-v8a/

          $BUILD_TOOLS/aapt package -f -M AndroidManifest.xml -I $PLATFORM_JAR -F unsigned.apk staging/
          $BUILD_TOOLS/zipalign -v 4 unsigned.apk aligned.apk
          
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          $BUILD_TOOLS/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --out final.apk aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Raylib-3D-APK
          path: final.apk
