name: Build Universal APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build 64-bit (arm64-v8a)
        run: |
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang \
          -shared -fPIC main.c -o libmain_64.so \
          -I$ANDROID_NDK_ROOT/sources/android/native_app_glue \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c \
          -landroid -llog -lEGL -lGLESv2

      - name: Build 32-bit (armeabi-v7a)
        run: |
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi34-clang \
          -shared -fPIC main.c -o libmain_32.so \
          -I$ANDROID_NDK_ROOT/sources/android/native_app_glue \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c \
          -landroid -llog -lEGL -lGLESv2

      - name: Generate Manifest
        run: |
          cat <<EOF > AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.battle">
              <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
              <application android:label="Cubic Battle Uni" android:hasCode="false" android:extractNativeLibs="true">
                  <activity android:name="android.app.NativeActivity" 
                            android:configChanges="orientation|screenSize|keyboardHidden"
                            android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="main" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Package Universal APK
        run: |
          SDK_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$SDK_VERSION
          PLATFORM_JAR=$(ls $ANDROID_HOME/platforms/*/android.jar | tail -n 1)
          
          # Создаем структуру для ОБЕИХ архитектур
          mkdir -p staging/lib/arm64-v8a
          mkdir -p staging/lib/armeabi-v7a
          cp libmain_64.so staging/lib/arm64-v8a/libmain.so
          cp libmain_32.so staging/lib/armeabi-v7a/libmain.so

          # Упаковка, выравнивание и подпись
          $BUILD_TOOLS/aapt package -f -M AndroidManifest.xml -I $PLATFORM_JAR -F unsigned.apk staging/
          $BUILD_TOOLS/zipalign -v 4 unsigned.apk aligned.apk
          
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          
          $BUILD_TOOLS/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android \
          --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
          --out final.apk aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-Universal-APK
          path: final.apk
