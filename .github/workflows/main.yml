name: Build C APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Shared Library
        run: |
          # Компилируем C код под aarch64 (64 бит)
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang \
          -shared main.c -o libmain.so -landroid -llog -lEGL -lGLESv2 \
          -I$ANDROID_NDK_ROOT/sources/android/native_app_glue \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c

      - name: Package APK
        run: |
          # Создаем структуру папок APK
          mkdir -p build/lib/arm64-v8a
          mv libmain.so build/lib/arm64-v8a/
          
          # Упаковка через aapt
          export PATH=$PATH:$ANDROID_HOME/build-tools/30.0.3
          aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-30/android.jar -F test.apk build/
          
          # Подпись (дебаг ключом)
          debug_keystore=~/.android/debug.keystore
          mkdir -p ~/.android
          keytool -genkey -v -keystore $debug_keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          apksigner sign --ks $debug_keystore --ks-pass pass:android test.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-C-APK
          path: test.apk
