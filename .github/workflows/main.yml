[package]
name = "cubicbattle"
version = "0.1.0"
edition = "2021"

[lib]
name = "cubicbattle"
# ВОТ ЭТА СТРОКА РЕШАЕТ ПРОБЛЕМУ:
path = "src/main.rs"
crate-type = ["cdylib"]

[dependencies]
macroquad = "0.4"

[package.metadata.android]
package_name = "com.cubicbattle.x"
label = "Cubic Battle X"
target_sdk_version = 30
min_sdk_version = 21
build_targets = ["aarch64-linux-android"]
assets = "assets"

# Секцию [[bin]] можно оставить или удалить, 
# но для Android важнее блок [lib] выше.
[[bin]]
name = "cubicbattle-bin"
path = "src/main.rs"
