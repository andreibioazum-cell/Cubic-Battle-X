name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Устанавливаем обе архитектуры
          targets: aarch64-linux-android armv7-linux-androideabi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Components
        run: |
          # Устанавливаем SDK платформу и NDK
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-30" "build-tools;30.0.3" "ndk;25.2.9519653"

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Build APK
        run: |
          # Создаем папку assets (обязательно)
          mkdir -p assets
          
          # Явно прописываем пути
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
          
          # Собираем APK
          cargo apk build
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-APK
          path: target/debug/apk/cubicbattle.apk
